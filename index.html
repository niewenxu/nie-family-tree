<style>

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{background:#FAF8F5;color:#1A1A1A;font-family:"Source Han Serif SC","Noto Serif CJK SC","PingFang SC",serif;line-height:1.6}

/* Nav */
#nv{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,248,245,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.06)}
.ni{max-width:1200px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
.nl{font-family:"PingFang SC",sans-serif;display:flex;gap:32px}
.nl a{color:#5A5A5A;text-decoration:none;font-size:14px;transition:color .2s}
.nl a:hover{color:#8B6914}
#nT{display:none;background:none;border:none;font-size:24px;cursor:pointer;color:#333}

/* Hero */
.hero{position:relative;min-height:66vh;display:flex;align-items:center;justify-content:center;padding:100px 24px 60px;overflow:hidden;text-align:center}
.hb{position:absolute;inset:0;background:linear-gradient(135deg,#FAF8F5 0%,#F0E8D8 50%,#E8DCC8 100%);z-index:0}
#hF{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.fc{position:absolute;color:#8B6914;opacity:0.12;animation:fUp 12s ease-in-out infinite;user-select:none;pointer-events:none;font-family:"KaiTi","楷体","STKaiti",serif}

.hc{position:relative;z-index:1;max-width:700px}
.hc h1{font-size:clamp(36px,6vw,60px);font-weight:900;letter-spacing:8px;margin-bottom:16px}
.hs{font-size:clamp(14px,2.5vw,18px);color:#8B6914;letter-spacing:4px;margin-bottom:8px}
.hd{font-size:15px;color:#888;max-width:480px;margin:0 auto 40px}
.hst{display:flex;justify-content:center;gap:40px}
.st .sn{font-size:32px;font-weight:700;display:block}
.st .sl{font-size:12px;color:#999;letter-spacing:2px;display:block;margin-top:4px}

/* Sections */
.sec{padding:70px 24px}
.sec h2{font-size:clamp(24px,3.5vw,36px);font-weight:700;margin-bottom:12px}
.sl{font-size:11px;letter-spacing:3px;color:#aaa;margin-bottom:8px}
.sd{font-size:15px;color:#888;margin-bottom:40px}

/* Beifen */
#bf{background:#fff;text-align:center}
#bf h2,#bf .sd{text-align:center}
.bf-sc{overflow-x:auto;padding-bottom:12px;text-align:center}
.bf-tr{display:inline-flex}
.bf-item{flex-shrink:0;padding:0 20px;text-align:center;cursor:pointer;transition:transform .2s;position:relative}
.bf-item:hover{transform:scale(1.2)}
.bf-item:hover .bf-c{color:#8B6914}
.bf-item::after{content:'';position:absolute;right:0;top:20%;height:60%;width:1px;background:#E0D8CC}
.bf-item:last-child::after{display:none}
.bf-g{font-size:12px;color:#aaa;margin-bottom:4px;letter-spacing:1px}
.bf-c{font-size:32px;font-weight:700;display:block;transition:color .2s}

/* Tree */
#tr{background:#FAF8F5}
.tc{display:flex;gap:12px;align-items:center;justify-content:center;margin-bottom:40px;flex-wrap:wrap}
.tc input{padding:10px 16px;border:1.5px solid #E0D8CC;border-radius:8px;font-size:14px;width:240px;background:#fff;outline:none;font-family:inherit}
.tc input:focus{border-color:#8B6914}
.g-j{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.g-btn{padding:6px 12px;border:1px solid #E0D8CC;border-radius:6px;background:#fff;font-size:12px;color:#666;cursor:pointer;font-family:inherit}
.g-btn:hover{border-color:#8B6914;color:#8B6914}
.g-btn.on{background:#8B6914;color:#fff;border-color:#8B6914}

#trC{max-width:1200px;margin:0 auto}
.g-row{opacity:1;transform:translateY(0);transition:opacity .6s,transform .6s;margin-bottom:32px;display:flex;flex-direction:column;align-items:center}
.g-h{text-align:center;margin-bottom:16px}
.g-h h3{font-size:22px;font-weight:700}
.g-i{font-size:13px;color:#999;margin-top:4px}
.g-l{width:40px;height:2px;background:#D4C5A9;margin:10px auto 0;border-radius:1px}
.g-m{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;width:100%}
.g-c{width:2px;height:20px;background:linear-gradient(to bottom,#D4C5A9,transparent);margin:0 auto}

.cg{display:flex;flex-direction:column;align-items:center}
.pc{background:#fff;border:1px solid #EDE8E0;border-radius:10px;padding:10px 3px;cursor:pointer;transition:all .25s;width:40px;min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.pc:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.06);border-color:#D4C5A9}
.pn{font-size:14px;font-weight:600;line-height:1.3;display:block}

/* History */
#hi{background:#fff}
.hg{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;max-width:800px;margin:0 auto}
.hc2{background:#FAF8F5;border:1px solid #EDE8E0;border-radius:12px;padding:28px;transition:all .25s}
.hc2:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.04)}
.hc2 h3{font-size:18px;font-weight:600;margin-bottom:8px}
.hc2 p{font-size:14px;color:#666}
.hd2{color:#8B6914!important;margin-top:6px;font-weight:500}

/* Footer */
.ft{background:#1A1A1A;color:#fff;padding:50px 24px;text-align:center}
.ft p{font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:4px}
.ft .fe{font-size:13px;color:rgba(255,255,255,0.5);margin-top:8px}

/* Modal */
#mO{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#mO.on{display:flex}
.modal{background:#fff;border-radius:16px;padding:32px;max-width:400px;width:90%;position:relative}
#mX{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;color:#999;cursor:pointer;width:28px;height:28px;border-radius:50%}
#mX:hover{background:#f0f0f0;color:#333}
#mC{text-align:left}
.mf{display:flex;padding:8px 0;border-bottom:1px solid #f0f0f0;align-items:flex-start}
.mf:last-child{border-bottom:none}
.ml{font-size:14px;color:#888;min-width:40px;flex-shrink:0}
.mv{font-size:14px;color:#1A1A1A;flex:1}
.fb{background:none;border:1px solid #D4C5A9;border-radius:6px;padding:6px 16px;font-size:13px;color:#8B6914;cursor:pointer;font-family:inherit}
.fb:hover{background:#8B6914;color:#fff}

/* #pwBtn */
#pB{padding:6px 12px;border:1px solid #8B6914;border-radius:6px;background:#fff;font-size:12px;color:#8B6914;cursor:pointer;font-family:inherit}
#pB:hover{background:#8B6914;color:#fff!important}

/* Responsive */
@media(max-width:768px){
  .nl{display:none}
  #nT{display:block}
  .nl.on{display:flex;flex-direction:column;position:absolute;top:60px;left:0;right:0;background:rgba(250,248,245,0.98);backdrop-filter:blur(12px);padding:16px 24px;gap:16px;border-bottom:1px solid rgba(0,0,0,0.06)}

  .st .sn{font-size:24px}
  .bf-item{padding:0 14px}
  .bf-c{font-size:24px}
  .pc{width:70px;min-height:70px}
  .pn{font-size:13px}
  .sec{padding:50px 16px}

.cl{text-align:center;margin-top:2px;width:40px;line-height:1}
.ca{font-size:16px;cursor:pointer;display:inline-block;animation:cf 1.8s ease-in-out infinite}

</head>

    var el=r.querySelector('.g-m');
    var dm=f?ms:g.m;
    dm.forEach(function(x){
      var w=document.createElement('div');
      w.className='cg';
      var c=document.createElement('div');
      c.className='pc';
      var fn=nm(x.n,gi);
      c.innerHTML='<span class=pn>'+fn.split('').join('<br>')+'</span>';
      c.onclick=function(){if(!window.UL&&nm(x.n,gi)!==x.n){cP();}else{oM(x.n,gi,ch,x.s);}};
      w.appendChild(c);
      if(gi<10){var cl=document.createElement('div');cl.className='cl';cl.innerHTML='<span class=ca>🛯</span>';cl.onclick=function(e){e.stopPropagation();alert('🙏');};w.appendChild(cl);}
      el.appendChild(w);
    });
    // Gen jump btn
    var b=document.createElement('button');
    b.className='g-btn';

      r.scrollIntoView({behavior:'smooth',block:'start'});
      document.querySelectorAll('.g-btn').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on');
    };
    j.appendChild(b);
  });
  setTimeout(function(){
    var obs=new IntersectionObserver(function(es){
      es.forEach(function(e){if(e.isIntersecting)e.target.classList.add('v');});
    },{threshold:0.1});
    document.querySelectorAll('.g-row').forEach(function(e){obs.observe(e);});
  },100);
}
